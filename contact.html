<body>
  <header class="header">
    <img src="../img/logo.png" class="logo" alt="logo" >
    <nav class="main-nav-header">
      <ul role="menubar" class="navigation-list">
        <li role="presentation">
          <a href="index.html" role="menuitem" class="nav-list-item">HOME</a>

        <li role="presentation">
          <a href="contact.html" role="menuitem" class="nav-list-item">CONTACT</a>
        </li>
      </ul>
    </nav>
  </header>
  <div class="contact-profile">
    <h1>Helia Tutueanu</h1>
    <h3>Full-Stack Developer</h3>
    <p>Athens, Greece</p>
    <a href="tel:+49 30 4849 2016">PN: +30 690 855 4649</a>
    <br>
    <a  href="mailto:eleni.tutueanu@gmail.com">EM: eleni.tutueanu@gmail.com</a>
    <br>
    <br>
    <form id="contact-form" action="" method="post">
      <h3>ASK ME ANYTHING</h3>
      <label class="contact-label">Name: </label>
      <input placeholder="Name" type="text" id="contact-name" tabindex="1" required>
      <br>
      <label class="contact-label">Email: </label>
      <input placeholder="Email Address" type="email" id="contact-email" tabindex="2" required>
      <br>
      <label class="contact-label">Phone: </label>
      <input placeholder="Phone Number" type="tel" id="contact-phone" tabindex="3" pattern="\d{3}[\-]\d{3}[\-]\d{4}" required>
      <br>
      <label class="contact-label">Message: </label>
      <textarea placeholder="Type message..." id="contact-message" tabindex="5" maxlength="240" required></textarea>
      <br>
      <button class="button__submit" name="submit" type="button" id="contact-submit" data-submit="...Sending">Submit</button>
    </form>
  </div>
  <footer>
    <p>Find me on:</p>
    <img class="socials" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Octicons-mark-github.svg/20px-Octicons-mark-github.svg.png" alt="github logo">
    <img class="socials" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Logo_of_Twitter.svg/20px-Logo_of_Twitter.svg.png" alt="twitter logo">
    <img class="socials" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/LinkedIn_logo_initials.png/20px-LinkedIn_logo_initials.png" alt="linkedin logo">
  </footer>
  <script src="../js/tota11y.min.js"></script>
